[Manager]
# Hardware watchdog (Pi 4 BCM2711). systemd kicks the WDT every RuntimeWatchdogSec/2;
# if no kick arrives for 15s the watchdog reboots the Pi. Catches kernel panics,
# stuck systemd, runaway resource exhaustion.
RuntimeWatchdogSec=15s

# After a watchdog reboot, allow up to 2 min for orderly shutdown next time.
RebootWatchdogSec=2min
